<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CQCQCQ — アマチュア無線 QSOロギングアプリ</title>
  <meta name="description" content="CQCQCQ は Mac・iPhone・iPad・Apple Watch に対応したアマチュア無線の交信記録（QSO）管理アプリです。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #000; color: #f5f5f7; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 800px; width: 100%; text-align: center; }
    .app-name {
      font-size: 3.5rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #00AAFF, #0055DD);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 1rem;
    }
    .tagline { font-size: 1.5rem; font-weight: 500; color: #f5f5f7; margin-bottom: 0.75rem; }
    .description { font-size: 1.05rem; color: #86868b; line-height: 1.6; max-width: 560px; margin: 0 auto 2.5rem; }
    .screenshot { width: 100%; max-width: 720px; margin: 0 auto 2.5rem; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0, 100, 255, 0.15); }
    .screenshot img { width: 100%; height: auto; display: block; }
    .platforms { font-size: 0.9rem; color: #86868b; margin-bottom: 2rem; }
    .links { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    .links a { color: #2997ff; text-decoration: none; font-size: 0.95rem; transition: color 0.2s; }
    .links a:hover { color: #6cb6ff; }
    @media (max-width: 600px) { .app-name { font-size: 2.5rem; } .tagline { font-size: 1.2rem; } .description { font-size: 0.95rem; } }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="app-name">CQCQCQ</h1>
    <p class="tagline">交信記録を、もっとスマートに。</p>
    <p class="description">
      CQCQCQ は Mac・iPhone・iPad・Apple Watch に対応した<br>
      アマチュア無線の交信記録（QSO）管理アプリです。<br>
      Apple 純正フレームワークのみで構築。iCloud 同期対応。
    </p>
    <div class="screenshot">
      <img src="screenshots/main-window.png" alt="CQCQCQ メインウィンドウ">
    </div>
    <p class="platforms">macOS / iOS / iPadOS / watchOS</p>
    <div class="links">
      <a href="https://x.com/CQCQCQApp" target="_blank">@CQCQCQApp</a>
      <a href="https://x.com/NobtakaJP" target="_blank">@NobtakaJP</a>
      <a href="https://github.com/nobtaka/CQCQCQ-web/issues" target="_blank">Feedback</a>
    </div>
  </div>
</body>
</html>
